<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocktail Recipes</title>
<style>
  :root{
    --bg:#0d0b0a;
    --panel:#16110f;
    --line:#2a221d;
    --gold:#c9a35b;
    --gold-soft:#e6cb93;
    --text:#f2ece2;
    --muted:#9c8f7e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    line-height:1.5;
    padding-bottom:60px;
  }
  header{
    text-align:center;
    padding:46px 20px 30px;
    border-bottom:1px solid var(--line);
    background:radial-gradient(120% 90% at 50% 0%,#1c1612 0%,var(--bg) 70%);
  }
  .eyebrow{
    letter-spacing:.42em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--gold);
    font-family:"Helvetica Neue",Arial,sans-serif;
    margin-bottom:14px;
  }
  h1{
    font-size:clamp(30px,7vw,52px);
    font-weight:600;
    letter-spacing:.01em;
  }
  h1 .amp{color:var(--gold);font-style:italic}
  .sub{color:var(--muted);margin-top:12px;font-size:14px;font-style:italic}

  .controls{
    max-width:1180px;margin:26px auto 0;padding:0 20px;
    display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center;
  }
  #search{
    flex:1 1 260px;max-width:420px;
    background:var(--panel);border:1px solid var(--line);
    color:var(--text);padding:12px 16px;border-radius:30px;
    font-family:inherit;font-size:15px;outline:none;
  }
  #search:focus{border-color:var(--gold)}
  #search::placeholder{color:var(--muted)}
  .filters{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
  .chip{
    background:transparent;border:1px solid var(--line);color:var(--muted);
    padding:8px 14px;border-radius:30px;cursor:pointer;font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;transition:.15s;
  }
  .chip:hover{color:var(--text);border-color:var(--gold)}
  .chip.active{background:var(--gold);color:#1a130b;border-color:var(--gold);font-weight:600}

  .section-title{
    max-width:1180px;margin:42px auto 4px;padding:0 24px;
    font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);
    font-family:"Helvetica Neue",Arial,sans-serif;
    display:flex;align-items:center;gap:16px;
  }
  .section-title::after{content:"";flex:1;height:1px;background:var(--line)}

  .grid{
    max-width:1180px;margin:18px auto 0;padding:0 16px;
    display:grid;gap:18px;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  }
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    overflow:hidden;cursor:pointer;transition:transform .18s,border-color .18s,box-shadow .18s;
    display:flex;flex-direction:column;
  }
  .card:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 12px 30px rgba(0,0,0,.5)}
  .thumb{aspect-ratio:1/1;overflow:hidden;background:#000}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .card-body{padding:14px 15px 16px}
  .card-cat{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);
    font-family:"Helvetica Neue",Arial,sans-serif;margin-bottom:6px}
  .card-name{font-size:19px;font-weight:600;line-height:1.2}

  .empty{max-width:1180px;margin:50px auto;text-align:center;color:var(--muted);padding:0 20px}

  /* Modal */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(3px);
    display:none;align-items:flex-start;justify-content:center;z-index:50;
    padding:24px 16px;overflow-y:auto;
  }
  .overlay.open{display:flex}
  .modal{
    background:var(--panel);border:1px solid var(--line);border-radius:18px;
    max-width:560px;width:100%;margin:auto;overflow:hidden;
    animation:rise .25s ease;
  }
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  .modal-hero{position:relative;aspect-ratio:16/10;background:#000;overflow:hidden}
  .modal-hero img{width:100%;height:100%;object-fit:cover}
  .modal-hero .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(22,17,15,.95))}
  .modal-hero .titles{position:absolute;left:24px;right:24px;bottom:16px}
  .modal-cat{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-soft);
    font-family:"Helvetica Neue",Arial,sans-serif;margin-bottom:6px}
  .modal-name{font-size:28px;font-weight:600;line-height:1.15}
  .close{
    position:absolute;top:14px;right:14px;z-index:3;
    width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
    background:rgba(0,0,0,.55);color:#fff;font-size:20px;line-height:38px;
  }
  .close:hover{background:var(--gold);color:#1a130b}
  .modal-body{padding:22px 26px 28px}
  .block{margin-bottom:18px}
  .block:last-child{margin-bottom:0}
  .block h3{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);
    font-family:"Helvetica Neue",Arial,sans-serif;margin-bottom:9px}
  .ing{list-style:none;display:flex;flex-direction:column;gap:7px}
  .ing li{display:flex;gap:12px;align-items:baseline;border-bottom:1px dotted var(--line);padding-bottom:7px}
  .ing .amt{color:var(--gold-soft);font-variant-numeric:tabular-nums;white-space:nowrap;min-width:64px;font-weight:600}
  .ing .nm{color:var(--text)}
  .steps{padding-left:20px;color:var(--text)}
  .steps li{margin-bottom:6px}
  .meta{display:flex;flex-wrap:wrap;gap:10px}
  .meta div{flex:1 1 150px;background:#0f0c0a;border:1px solid var(--line);border-radius:10px;padding:11px 13px}
  .meta .k{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
    font-family:"Helvetica Neue",Arial,sans-serif;margin-bottom:4px}
  .meta .v{font-size:15px}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:50px;padding:0 20px;font-style:italic}
  @media(max-width:480px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
    .card-name{font-size:16px}
    .modal-name{font-size:23px}
    .modal-body{padding:20px 18px 24px}
  }
</style>
</head>

const CAT_ORDER = ["Non-Alcoholic","Tequila","Mezcal","Rum","Whiskey | Bourbon","Scotch","Cognac","Signature Martinis","Dessert","Still Spec"];

const content = document.getElementById('content');
const filtersEl = document.getElementById('filters');
const searchEl = document.getElementById('search');
const emptyEl = document.getElementById('empty');
let activeCat = "All";

// build filter chips
["All",...CAT_ORDER].forEach(cat=>{
  const b=document.createElement('button');
  b.className='chip'+(cat==="All"?' active':'');
  b.textContent=cat;
  b.onclick=()=>{activeCat=cat;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));b.classList.add('active');render();};
  filtersEl.appendChild(b);
});

function render(){

  content.innerHTML='';
  let shown=0;
  CAT_ORDER.forEach(cat=>{
    if(activeCat!=="All" && activeCat!==cat) return;
    let items=RECIPES.filter(r=>r.cat===cat);
    if(q){
      items=items.filter(r=>{
        const hay=(r.name+' '+r.ing.map(i=>i[1]).join(' ')).toLowerCase();
        return hay.includes(q);
      });
    }
    if(!items.length) return;
    const h=document.createElement('div');h.className='section-title';h.textContent=cat;
    content.appendChild(h);
    const grid=document.createElement('div');grid.className='grid';
    items.forEach(r=>{
      shown++;
      const card=document.createElement('div');card.className='card';
      card.onclick=()=>openModal(r);
      card.innerHTML=`
        <div class="thumb"><img loading="lazy" src="photos/${r.slug}.jpg" alt="${r.name}"
             onerror="this.parentElement.innerHTML='<div style=&quot;display:flex;height:100%;align-items:center;justify-content:center;color:#6a5d4d;font-size:13px&quot;>No photo</div>'"></div>
        <div class="card-body">
          <div class="card-cat">${r.cat}</div>
          <div class="card-name">${r.name}</div>
        </div>`;
      grid.appendChild(card);
    });
    content.appendChild(grid);
  });
  emptyEl.style.display = shown? 'none':'block';
}

function openModal(r){
  const m=document.getElementById('modal');
  const ing=r.ing.map(i=>`<li><span class="amt">${i[0]}</span><span class="nm">${i[1]}</span></li>`).join('');
  const steps=(r.steps&&r.steps.length)?
    `<div class="block"><h3>Method</h3><ol class="steps">${r.steps.map(s=>`<li>${s}</li>`).join('')}</ol></div>`:'';
  m.innerHTML=`
    <button class="close" onclick="closeModal()" aria-label="Close">×</button>
    <div class="modal-hero">
      <img src="photos/${r.slug}.jpg" alt="${r.name}"
        onerror="this.style.display='none'">
      <div class="scrim"></div>
      <div class="titles">
        <div class="modal-cat">${r.cat}</div>
        <div class="modal-name">${r.name}</div>
      </div>
    </div>
    <div class="modal-body">
      <div class="block"><h3>Build</h3><div>${r.build}</div></div>
      <div class="block"><h3>Ingredients</h3><ul class="ing">${ing}</ul></div>
      ${steps}
      <div class="block"><div class="meta">
        <div><div class="k">Glassware</div><div class="v">${r.glass||'—'}</div></div>
        <div><div class="k">Garnish</div><div class="v">${r.garnish||'—'}</div></div>
      </div></div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target.id==='overlay') closeModal();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
searchEl.addEventListener('input',render);
render();
</script>
</body>
</html>
